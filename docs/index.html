<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สนามแข่งขันนักเรียน</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css?v=20260616-card-fade-band">
  <script src="script.js?v=20260616-card-fade-band" defer></script>
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" aria-label="เมนูหลัก">
      <button class="brand" type="button" data-tab="home" aria-label="กลับหน้าแรก">
        <span class="brand-icon"><i class="bi bi-trophy-fill" aria-hidden="true"></i></span>
        <span class="brand-text">สนามแข่งขัน<br>นักเรียน</span>
      </button>

      <button class="sidebar-collapse icon-only" id="sidebarToggle" type="button" aria-label="ย่อหรือขยายแถบเมนู"><i class="bi bi-list" aria-hidden="true"></i></button>

      <nav class="side-nav">
        <button class="side-item" type="button" data-tab="all">
          <i class="bi bi-grid-fill" aria-hidden="true"></i><span>ทั้งหมด</span>
        </button>
        <button class="side-item" type="button" data-tab="deadline">
          <i class="bi bi-clock-history" aria-hidden="true"></i><span>ใกล้หมดเขต</span>
        </button>
        <button class="side-item" type="button" data-tab="calendar">
          <i class="bi bi-calendar-event" aria-hidden="true"></i><span>ปฏิทิน</span>
        </button>
        <button class="side-item" type="button" data-tab="summary">
          <i class="bi bi-card-text" aria-hidden="true"></i><span>สรุปรายเดือน</span>
        </button>

        <div class="side-divider" role="presentation"></div>

        <button class="side-item" type="button" data-side-filter="feature" data-value="มีเกียรติบัตร">
          <i class="bi bi-award" aria-hidden="true"></i><span>มีเกียรติบัตร</span>
        </button>
        <button class="side-item" type="button" data-side-filter="feature" data-value="ฟรี">
          <i class="bi bi-patch-check" aria-hidden="true"></i><span>ฟรี</span>
        </button>
        <button class="side-item" type="button" data-side-filter="feature" data-value="ออนไลน์">
          <i class="bi bi-globe2" aria-hidden="true"></i><span>ออนไลน์</span>
        </button>
        <button class="side-item" type="button" data-side-filter="type" data-value="จิตอาสา">
          <i class="bi bi-heart" aria-hidden="true"></i><span>จิตอาสา</span>
        </button>
        <button class="side-item" type="button" data-side-filter="type" data-value="งานแนะแนว">
          <i class="bi bi-mortarboard" aria-hidden="true"></i><span>งานแนะแนว</span>
        </button>
        <button class="side-item" type="button" data-side-filter="type" data-value="กิจกรรมอื่น ๆ">
          <i class="bi bi-flag" aria-hidden="true"></i><span>กิจกรรมอื่น ๆ</span>
        </button>
        <a class="side-item side-link" href="https://www.camphub.in.th/medical-health/doctor/" target="_blank" rel="noopener">
          <i class="bi bi-search" aria-hidden="true"></i><span>ค้นหากิจกรรมเพิ่มเติม</span>
        </a>
      </nav>

      <div class="sidebar-note">
        <strong>สนใจเข้าร่วม?</strong>
        <span>อ่านรายละเอียดแล้วติดต่อครูผู้ประสานงานของกิจกรรมนั้น</span>
      </div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <button class="mobile-menu icon-only" id="mobileSidebarToggle" type="button" aria-label="เปิดหรือปิดเมนู"><i class="bi bi-list" aria-hidden="true"></i></button>
        <div class="search-shell">
          <label class="sr-only" for="searchInput">ค้นหา</label>
          <i class="bi bi-search" aria-hidden="true"></i>
          <input id="searchInput" type="search" placeholder="ค้นหาการแข่งขัน ค่าย โครงงาน วิทย์ ภาษาอังกฤษ...">
        </div>
        <div class="top-actions">
          <span class="count-badge"><strong id="totalCount">0</strong><span>รายการ</span></span>
          <button class="icon-button icon-only" type="button" aria-label="แจ้งเตือน"><i class="bi bi-bell" aria-hidden="true"></i></button>
        </div>
      </header>

      <main class="main-content">
        <section class="status-panel" id="loadingPanel" hidden>
          <p>กำลังโหลดข้อมูลกิจกรรม...</p>
        </section>

        <section class="status-panel error-panel" id="errorPanel" hidden>
          <h2>ยังโหลดข้อมูลไม่ได้</h2>
          <p id="errorMessage">กรุณาตรวจสอบ DATA_URL ในไฟล์ docs/script.js</p>
        </section>

        <section class="filter-panel" id="filterPanel" aria-label="ตัวกรองกิจกรรม" hidden>
          <div class="filter-title"><i class="bi bi-funnel" aria-hidden="true"></i>กรองข้อมูล</div>
          <div class="filters">
            <div>
              <label for="typeFilter">ประเภท</label>
              <select id="typeFilter"></select>
            </div>
            <div>
              <label for="categoryFilter">หมวดหมู่</label>
              <select id="categoryFilter"></select>
            </div>
            <div>
              <label for="levelFilter">ระดับชั้น</label>
              <select id="levelFilter"></select>
            </div>
            <div>
              <label for="interestFilter">แท็กความสนใจ</label>
              <select id="interestFilter"></select>
            </div>
            <div>
              <label for="featureFilter">แท็กคุณสมบัติ</label>
              <select id="featureFilter"></select>
            </div>
            <div>
              <label for="portfolioFilter">Portfolio</label>
              <select id="portfolioFilter"></select>
            </div>
            <div>
              <label for="sortSelect">เรียงตาม</label>
              <select id="sortSelect">
                <option value="registerOpenDate">วันเปิดสมัคร</option>
                <option value="registerCloseDate">วันปิดสมัคร</option>
                <option value="submissionDate">วันส่งผลงาน</option>
                <option value="eventStartDate">วันเริ่มแข่งขัน/กิจกรรม</option>
              </select>
            </div>
          </div>

          <div class="toolbar-actions">
            <button class="secondary-button" id="resetFiltersButton" type="button"><i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i>ล้างตัวกรอง</button>
            <p class="result-note" id="resultNote" aria-live="polite"></p>
          </div>
        </section>

        <section class="content-view" id="homeView" aria-label="หน้าแรก"></section>
        <section class="content-view" id="allView" aria-label="รายการกิจกรรมทั้งหมด" hidden></section>
        <section class="content-view" id="deadlineView" aria-label="รายการใกล้หมดเขต" hidden></section>
        <section class="content-view" id="calendarView" aria-label="ปฏิทินกิจกรรม" hidden></section>
        <section class="content-view" id="detailView" aria-label="รายละเอียดกิจกรรม" hidden></section>
        <section class="content-view" id="summaryView" aria-label="สรุปประชาสัมพันธ์" hidden>
          <div class="summary-controls">
            <div class="segmented" role="group" aria-label="ช่วงเวลาสรุป">
              <button class="segment is-active" type="button" data-summary-mode="week">รายสัปดาห์</button>
              <button class="segment" type="button" data-summary-mode="month">รายเดือน</button>
            </div>
            <button class="primary-button" id="copySummaryButton" type="button"><i class="bi bi-clipboard" aria-hidden="true"></i>คัดลอกข้อความประชาสัมพันธ์</button>
          </div>
          <div id="summaryContent"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
</body>
</html>
